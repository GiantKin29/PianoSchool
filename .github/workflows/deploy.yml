name: GitHub Pages へデプロイ

on:
  push:
    branches:
      - claude/piano-school-website-6J0t9
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存パッケージをインストール
        run: npm ci

      - name: ビルド
        run: npm run build

      - name: Pages 用アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
